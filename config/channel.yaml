# 대상 영상 목록 (PoC: 5~10개, 주제 밀도 높은 것 우선)
videos:
  - https://www.youtube.com/watch?v=8fYXYk42LxU

# 콘텐츠 언어 (Whisper / 자막 언어 힌트)
language: ko

# 3단계 STT (로컬 베이스라인). 자막이 없거나 깨졌을 때만 이 경로를 탄다.
stt:
  engine: faster-whisper  # faster-whisper(AI, 기본, 정확도 높음) | vosk(경량 오프라인, non-AI —
                         #   `uv sync --extra vosk` 필요, 완전 오프라인·초경량이지만 정확도는 뚜렷이 낮음)
  model: auto            # auto | tiny | base | small | medium | large-v3  (engine: faster-whisper 전용)
                         #   auto: GPU면 large-v3(최고 품질), GPU 없으면 small 로 자동 선택
  device: auto           # auto | cuda | cpu  (engine: faster-whisper 전용)
  compute_type: auto     # auto | int8 | int8_float16 | float16
                         #   auto: GPU면 float16, CPU면 int8 로 자동 선택(권장)
  word_timestamps: false # 다운스트림은 세그먼트 시각만 사용 → 단어 타임스탬프는 불필요(속도↑)
  batched: true          # GPU 배치 추론(BatchedInferencePipeline)으로 가속. cuda 아니면 무시.
  batch_size: 16         # large 계열은 8GB VRAM 스래싱 방지를 위해 내부적으로 4 로 상한 적용됨
  cpu_threads: 0          # CPU 추론 스레드 수. 0 이면 물리 코어 수 자동 감지(psutil, 실측 ~10%↑)
  vosk_model_size: small # small | large. 언어별로 large 가 없으면(예: 한국어) small 로 자동 대체(engine: vosk 전용)

# 트랜스크립트 우선순위: ① 업로더 제공 수동 자막 > ② 유튜브 자동 생성 자막 > ③ 로컬
# STT(AI 모델, CPU/GPU). 수동 자막을 1순위로 신뢰하고, 없거나 깨진 채로 제공된 경우
# (예: '10분 영상에 한 줄'처럼 너무 짧거나 커버리지가 미달)엔 자동 생성 자막을 시도하며,
# 그마저 없거나 깨졌을 때만 로컬 STT 로 폴백한다(자원을 쓰는 마지막 수단). 자막은 채택
# 전에 완전성(커버리지·세그먼트 수)을 검증한다.
subtitles:
  use_manual: true          # 수동(크리에이터) 자막을 소스 후보로 쓸지
  use_auto_fallback: true   # 유튜브 자동자막을 소스 후보로 쓸지
  stt_first: false          # false: 수동 > 자동 자막 우선(권장). true: STT 를 1순위로 강제(레거시)
  min_coverage_ratio: 0.5   # 자막이 영상 길이의 이 비율 미만만 커버하면 '깨진 자막'으로 보고 건너뜀
  min_caption_segments: 2   # 자막 세그먼트가 이 미만이면(한 줄짜리) 건너뜀

# 자막 보정(4.5단계, 선택) · 5·6단계 LLM
llm:
  provider: claude            # claude(로컬 Claude Code CLI) | gemini(Google Gemini, 본인 API 키)
                              #   gemini 는 aistudio.google.com/apikey 에서 키 발급 후 GUI 에서 입력(keyring 보관)
  model: claude-opus-4-8      # provider 에 맞는 모델 ID (claude-* 또는 gemini-2.5-flash / gemini-2.5-pro)
  max_chars_per_chunk: 8000   # 추출·보정 단계 트랜스크립트 청크 크기
  repair_transcript: false    # true 면 트랜스크립트 확보 직후 LLM 으로 깨진 자막을 교정(타임스탬프 보존)

output_dir: output
data_dir: data
